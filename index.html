<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kosky's Tavern</title>
    <script src="https://xri.onl/XRi.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/components.css">
    <link rel="stylesheet" href="style/debug.css">
    <script src="js/utils.js"></script>
</head>
<body>

<div class="loader-container">
    <h2 id="main-title">Kosky's Tavern</h2>
    <div class="progress-track">
        <div id="progress-bar" class="progress-fill"></div>
    </div>
    <div id="status-text">Loading Unity...</div>
</div>
<div id="vr-overlay" class="overlay">
    <div class="popup">
        <h3></h3>
        <p></p>
        <div class="popup-buttons">
            <button class="btn-no"></button>
            <button class="btn-yes"></button>
        </div>
    </div>
</div>


<div id="debug-overlay">
    <button class="debug-close-btn" onclick="document.getElementById('debug-overlay').style.display='none'">CHIUDI</button>
    <div id="debug-content" style="margin-top: 100px;"></div>
</div>

<script>
const params = getUrlParams();
log('debug mode: ' + params.debug);
const basePath = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
    ? '' 
    : '/XRi-game-example/';

const RAW_BASE = "https://raw.githubusercontent.com/simonevetere/XRi-game-example/main/assets/3d/";
const assetsToLoad = [
    // Mappe
    { id: 'village', url: RAW_BASE + 'maps/newvillage.glb' },
    { id: 'tower_defense_map', url: RAW_BASE + 'maps/tower_defense_map.glb' },
    // Eroi
    { id: 'elf', url: RAW_BASE + 'playable/elf.glb' },
    { id: 'dragonide', url: RAW_BASE + 'playable/dragonide.glb' },
    { id: 'knight', url: RAW_BASE + 'playable/knight.glb' },
    { id: 'troll',  url: RAW_BASE + 'playable/troll.glb' },
    // obj
    { id: 'sword', url: RAW_BASE + 'obj/sword.glb' },
    { id: 'dagger', url: RAW_BASE + 'obj/dagger.glb' },
    { id: 'stick', url: RAW_BASE + 'obj/stick.glb' },
    { id: 'bell',  url: RAW_BASE + 'obj/bell.glb' }
];

function updateUI(percent, text) {
    document.getElementById('progress-bar').style.width = percent + "%";
    document.getElementById('status-text').innerText = text;
}

async function startPreload() {
    XRi.clearAll(); 
    const total = assetsToLoad.length;

    for (let i = 0; i < assetsToLoad.length; i++) {
        const asset = assetsToLoad[i];
        let assetBytes = 0;
        let assetSizeStr = "N/A";

        try {
            const res = await fetch(asset.url, { method: 'HEAD' });
            assetBytes = parseInt(res.headers.get('content-length') || 0);
            assetSizeStr = (assetBytes / (1024 * 1024)).toFixed(2) + " MB";
        } catch (e) { console.warn("Errore HEAD"); }

        let secondsCounter = 0;
        const monitorInterval = setInterval(() => {
            const currentMbps = navigator.connection?.downlink || 1; // Default 1mbps se manca
            const estimate = getDownloadEstimate(assetBytes, currentMbps, secondsCounter);
            
            updateUI(
                Math.round((i / total) * 100), 
                `Scarico ${asset.id}: ${estimate} - Vel: ${currentMbps}Mbps`
            );
            secondsCounter += 0.5;
        }, 500);

        try {
            current3d = await XRi.spawn(asset.id, asset.url, 0.1, { x: 0, y: 1, z: 0.5 });

            current3d.setVisible(false);

            clearInterval(monitorInterval);
            log(`[OK] ${asset.id} (${assetSizeStr})`, "#00ff00");
        } catch (err) {
            i = i - 1;
            clearInterval(monitorInterval);
            log(`[ERR] ${asset.id} fallito`, "#ff0000");
        }
    }

    updateUI(100, "COMPLETATO - Reindirizzamento...");

    village = XRi.getClassById("village");
    await village.setVisible(true);
    await village.resetRotation(1);
    await village.rotate(180);
    await village.setGrabbable(false);
    await village.setScale(0.8,1);
    await village.setPosition({ x: 0, y: 1, z: 1 }, 0);

    if (!params["session"]) {
        log("Nessuna sessione attiva nell'URL", "#ffff00");
        
        mostraMessaggio(
            "Pronto a Entrare?", 
            "Vuoi iniziare una nuova avventura o rientrare in una esistente?", 
            {
                textYes: "Nuova Avventura",
                actionYes: () => {
                    const newId = XRi.generateId().replace("id_", "");
                    const newParams = new URLSearchParams(window.location.search);
                    newParams.set("session", newId);
                    manageStorage('delete', 'local_player'); 
                    window.location.href = basePath + "playable/name.html?" + newParams.toString();
                },
                textNo: "Riconnetti / Unisciti",
                actionNo: () => {
                    window.location.href = basePath + "/reconnect.html" + window.location.search;
                }
            }
        );
    } else {
        window.location.href = basePath + "/reconnect.html" + window.location.search;
    }
}

function getDownloadEstimate(bytes, mbps, secondsElapsed) {
    if (!bytes || !mbps || mbps <= 0) return "Calcolo...";
    
    const fileMb = (bytes * 8) / (1024 * 1024);
    const estimatedTotalSeconds = fileMb / mbps;
    
    let percent = Math.round((secondsElapsed / estimatedTotalSeconds) * 100);
    if (percent > 99) percent = 99;

    return `${percent}% (ETA: ${Math.max(0, Math.round(estimatedTotalSeconds - secondsElapsed))}s)`;
}

window.onload = () => {
    oldsessionplayer = getStorageData().local_player;

    manageStorage('clear');
    
    manageStorage('save', 'local_player', oldsessionplayer);

    let attempts = 0;
    const maxAttempts = 20;

    const checkReady = () => {

    if (window.XRi) {
        log("Inizializzazione Multiplayer...", "#00ff00");
        XRi.initMultiplayer();
    }

        if (XRi.isReady) {
            startPreload();
            document.getElementById('vr-overlay').style.display = 'none'; 
        } 
        else {
            attempts++;
            
            if (attempts < maxAttempts) {
                setTimeout(checkReady, 100);
            } 
            else {
                mostraMessaggio(
                    "🕶️ Visore non rilevato", 
                    "Non abbiamo trovato un visore. Vuoi riprovare la scansione o continuare?", 
                    {
                        textNo: "Riprova Scansione",
                        actionNo: () => { startPreload(); },
                        textYes: "Continua comunque",
                        actionYes: () => { closePopup(); }
                    }
                );
            }
        }
    };

    checkReady();
};

function closePopup() {
    document.getElementById('vr-overlay').style.display = 'none';
    
    let agg = 0;

    function simulateDownload() {

        for (let i = 0; i < assetsToLoad.length; i++) {
            const asset = assetsToLoad[i];    
            manageStorage('save', `${asset.id}`, "true");
            manageStorage('save', `url_${asset.id}`, asset.url);
            log(`[OK] ${asset.id} pronto`, "#00ff00");
        }

        if (agg <= 100) {
            updateUI(agg, "download assets...");
            agg += 1;

            if (agg <= 100) {
                setTimeout(simulateDownload, 15);
            } else {
                if (!params["session"]) {
                    log("Nessuna sessione attiva nell'URL", "#ffff00");
                    
                    mostraMessaggio(
                        "Pronto a Entrare?", 
                        "Vuoi iniziare una nuova avventura o rientrare in una esistente?", 
                        {
                            textYes: "Nuova Avventura",
                            actionYes: () => {
                                const newId = XRi.generateId().replace("id_", "");
                                const newParams = new URLSearchParams(window.location.search);
                                newParams.set("session", newId);
                                manageStorage('delete', 'local_player'); 
                                window.location.href = basePath + "playable/name.html?" + newParams.toString();
                            },
                            textNo: "Riconnetti / Unisciti",
                            actionNo: () => {
                                window.location.href = basePath + "/reconnect.html" + window.location.search;
                            }
                        }
                    );
                } else {
                    window.location.href = basePath + "/reconnect.html" + window.location.search;
                }
            }
        }
    }

    simulateDownload();
}

window.onerror = function(message, source, lineno, colno, error) {
    const errorMsg = `[JS ERR] ${message} (riga ${lineno}:${colno})`;
    if (window.XRi) {
        window.XRi._broadcast(`window.XRi._safeLog("${errorMsg}", "#ff0000");`);
        window.XRi._safeLog(errorMsg, "#ff0000");
    }
    return false;
};
</script>
</body>
</html>
