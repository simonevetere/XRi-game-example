<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kosky's Tavern</title>
    <script src="https://xri.onl/XRi.js?v=c"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/components.css">
    <link rel="stylesheet" href="style/debug.css">
    <script src="js/utils.js"></script>
</head>
<body>

<div class="loader-container">
    <h2 id="main-title">Kosky's Tavern</h2>
    <div class="progress-track">
        <div id="progress-bar" class="progress-fill"></div>
    </div>
    <div id="status-text">Loading Unity...</div>
</div>
<div id="vr-overlay" class="overlay">
    <div class="popup">
        <h3></h3>
        <p></p>
        <div class="popup-buttons">
            <button class="btn-no"></button>
            <button class="btn-yes"></button>
        </div>
    </div>
</div>


<div id="debug-overlay">
    <button class="debug-close-btn" onclick="document.getElementById('debug-overlay').style.display='none'">CHIUDI</button>
    <div id="debug-content" style="margin-top: 100px;"></div>
</div>

<script>
const params = getUrlParams();
log('debug mode: ' + params.debug);

// Database degli assets da pre-caricare
const RAW_BASE = "https://raw.githubusercontent.com/simonevetere/XRi-game-example/main/assets/3d/";
const assetsToLoad = [
    // Mappe
    { id: 'village', url: RAW_BASE + 'maps/village.glb' },
    // Eroi
    { id: 'archer', url: RAW_BASE + 'playable/archer.glb' },
    { id: 'knight', url: RAW_BASE + 'playable/knight.glb' },
    { id: 'troll',  url: RAW_BASE + 'playable/troll.glb' }
];

function updateUI(percent, text) {
    document.getElementById('progress-bar').style.width = percent + "%";
    document.getElementById('status-text').innerText = text;
}

async function startPreload() {
    log('Avvio initMultiplayer...', "#ffff00");
    XRi.initMultiplayer();
    XRi.clearAll(); 
    
    const total = assetsToLoad.length;
    updateUI(0, "Inizializzazione download...");

    for (let i = 0; i < assetsToLoad.length; i++) {
        const asset = assetsToLoad[i];
        const currentProgress = Math.round((i / total) * 100);
        
        updateUI(currentProgress, `Download: ${asset.id}...`);
        
        try {
            current3d = await XRi.spawn(asset.id, asset.url, 0.1, { x: 0, y: -50, z: 0 });

            current3d.setVisible(false);
            
            manageStorage('save', `${asset.id}`, "true");
            log(`[OK] ${asset.id} pronto`, "#00ff00");
        } catch (err) {
            log(`[ERR] Fallito ${asset.id}`, "#ff0000");
        }
    }

    updateUI(100, "COMPLETATO");
    setTimeout(() => {
        window.location.href = "/playable/name.html";
    }, 500);
}

window.onload = () => {
    manageStorage('clear');

    let attempts = 0;
    const maxAttempts = 20;

    const checkReady = () => {
        if (window.XRi && XRi.isReady) {
            startPreload();
            document.getElementById('vr-overlay').style.display = 'none'; 
        } 
        else {
            attempts++;
            
            if (attempts < maxAttempts) {
                setTimeout(checkReady, 100);
            } 
            else {
                mostraMessaggio(
                    "🕶️ Visore non rilevato", 
                    "Non abbiamo trovato un visore. Vuoi riprovare la scansione o continuare?", 
                    {
                        textNo: "Riprova Scansione",
                        actionNo: () => { startPreload(); },
                        textYes: "Continua comunque",
                        actionYes: () => { closePopup(); }
                    }
                );
            }
        }
    };

    checkReady();
};

function closePopup() {
    document.getElementById('vr-overlay').style.display = 'none';
    
    let agg = 0;

    function simulateDownload() {

        for (let i = 0; i < assetsToLoad.length; i++) {
            const asset = assetsToLoad[i];    
            manageStorage('save', `${asset.id}`, "true");
            manageStorage('save', `url_${asset.id}`, asset.url);
            log(`[OK] ${asset.id} pronto`, "#00ff00");
        }

        if (agg <= 100) {
            updateUI(agg, "download assets...");
            agg += 1;

            if (agg <= 100) {
                setTimeout(simulateDownload, 15);
            } else {
                setTimeout(() => {
                    window.location.href = "/playable/name.html?isXR=false";
                }, 500);
            }
        }
    }

    XRi.initMultiplayer();
    simulateDownload();
}
</script>
</body>
</html>
